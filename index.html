<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="SFC Festival Guide は、慶應SFCの学園祭向けデジタルパンフレット兼ナビゲーションアプリです。"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>SFC Festival Guide</title>
    <script>
      (() => {
        const key = 'sfc-festival-guide-theme-v2';
        let theme = 'light';
        try {
          const saved = window.localStorage.getItem(key);
          if (saved === 'light' || saved === 'dark') theme = saved;
        } catch {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0b1020' : '#ffffff');
      })();
    </script>
    <link rel="stylesheet" href="./assets/img/styles.css" />
    <!-- 外部 CSS がキャッシュで古いときの保険（HTML 更新分は必ず再取得される想定） -->
    <style>
      nav.bottom-nav {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
      /* マップ行: クラス名に頼らず data-route で水色（ホームの最初のカード＝/map 想定） */
      button[data-route='/map'] .quick-link__body span.quick-link__hint,
      .quick-link__body span.quick-link__hint--map-pop {
        color: #0e7490 !important;
      }
      :root[data-theme='dark'] button[data-route='/map'] .quick-link__body span.quick-link__hint,
      :root[data-theme='dark'] .quick-link__body span.quick-link__hint--map-pop {
        color: #2dd4bf !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
